name: Save datos.json

on:
  repository_dispatch:
    types: [save-data]

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.APP_TOKEN }}

      - name: Write datos.json
        run: |
          echo '${{ github.event.client_payload.data }}' > datos.json

      - name: Commit and push
        run: |
          git config user.name "gestor-aws-bot"
          git config user.email "bot@gestor-aws"
          git add datos.json
          git diff --staged --quiet || git commit -m "Actualización datos — $(date +'%Y-%m-%d %H:%M')"
          git push
